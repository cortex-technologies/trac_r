<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAC_R</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1/dist/chartjs-chart-matrix.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: monospace; background-color: #111; color: #eee; height: 100vh; display: flex; }
        .sidebar { width: 300px; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .run-item { border: 1px solid #444; padding: 10px; margin-bottom: 10px; transition: background 0.2s; }
        .run-item:hover { background: #333; }
        .run-item.active { background: #444; border-color: #888; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .chart-box { background: #222; border: 1px solid #444; padding: 20px; display: flex; flex-direction: column; min-width: 0; }
        
        #dynamic-charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        #run-title-display {
            margin: 0;
        }
        .chart-controls { display: flex; gap: 20px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #444; align-items: center; flex-wrap: wrap; font-size: 0.9em; }
        
        .chart-wrapper { width: 100%; display: flex; justify-content: center; }
        .chart-container { position: relative; width: 100%; height: 400px; }
        .chart-container.square-mode { width: 100% !important; height: auto !important; aspect-ratio: 1 / 1; max-width: 500px; max-height: 500px; }
        
        pre code { display: block; background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; color: #a5d6ff; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <h3 style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            Experiment Runs
            <span id="status-badge" style="font-size: 0.6em; padding: 3px 6px; border-radius: 4px; font-weight: normal;"></span>
        </h3>
        <button id="clear-all-btn" style="margin-bottom: 15px; padding: 6px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; cursor: pointer;">Clear All</button>
        <div id="runs-list"></div>
    </div>
    
    <div class="main-content">
        <div class="header-row">
            <h2 id="run-title-display">Select runs to compare</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="layout-control-container">
                    <label for="non-line-select">Non-Line Charts:</label>
                    <select id="non-line-select" style="padding: 5px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px;">
                        <option value="latest">Show Latest</option>
                        <option value="all">Show All</option>
                        <option value="none">Show None</option>
                    </select>
                </div>
                <div class="layout-control-container">
                    <label for="layout-select">Layout:</label>
                    <select id="layout-select" style="padding: 5px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px;">
                        <option value="auto">Auto (Smart)</option>
                        <option value="1">1 Column</option>
                        <option value="2">2 Columns</option>
                        <option value="3">3 Columns</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="run-warnings-container" style="display: none; background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; color: #f59e0b; padding: 15px; border-radius: 5px; margin-bottom: 20px;"></div>
        <div id="dynamic-charts-container"></div>
        
    </div>

    <script>
        const RUN_COLORS = [
            '#3b82f6', '#22c55e', '#ef4444', '#a855f7', '#f59e0b', 
            '#ec4899', '#06b6d4', '#10b981', '#f97316', '#6366f1'
        ];
        let allRuns = [];
        let selectedRuns = [];
        let chartInstances = {};
        let chartConfigs = {};

        function calculateEMA(data, weight) {
            if (weight <= 0) return data;
            if (data.length === 0) return [];
            let smoothed = [];
            let current = null;
            for (let i = 0; i < data.length; i++) {
                if (data[i] === null || isNaN(data[i])) {
                    smoothed.push(data[i]);
                } else {
                    if (current === null) current = data[i];
                    else current = current * weight + data[i] * (1 - weight);
                    smoothed.push(current);
                }
            }
            return smoothed;
        }

        async function fetchRuns() {
            try {
                const response = await fetch('/api/runs');
                const runs = await response.json();
                allRuns = runs;
                const list = document.getElementById('runs-list');
                list.innerHTML = '';
                runs.forEach((run, index) => {
                    const div = document.createElement('div');
                    div.className = 'run-item';
                    const scriptText = run.source_script ? `<br><small style="color: #a855f7;">Script: ${run.source_script}</small>` : '';
                    div.innerHTML = `
                        <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; width: 100%; margin: 0;">
                            <input type="checkbox" class="run-checkbox" value="${index}" style="margin-top: 4px;">
                            <div style="flex: 1;">
                                <b>${run.run_name || 'Run'} #${run.run_number || '?'}</b><br><small>${run.timestamp}</small><br><small>Commit: ${run.git_commit}</small>${scriptText}
                            </div>
                        </label>
                    `;
                    const checkbox = div.querySelector('input');
                    checkbox.addEventListener('change', () => {
                        if (checkbox.checked) {
                            div.classList.add('active');
                            if (!selectedRuns.includes(run)) selectedRuns.push(run);
                        } else {
                            div.classList.remove('active');
                            selectedRuns = selectedRuns.filter(r => r !== run);
                        }
                        selectedRuns.sort((a, b) => allRuns.indexOf(a) - allRuns.indexOf(b));
                        loadMultipleRunsData();
                    });
                    list.appendChild(div);
                });
                if(runs.length > 0) {
                    const firstCb = list.querySelector('input');
                    firstCb.checked = true;
                    firstCb.dispatchEvent(new Event('change'));
                }
            } catch (err) {
                console.error("Failed to fetch runs:", err);
            }
        }

        document.getElementById('clear-all-btn').addEventListener('click', () => {
            document.querySelectorAll('.run-checkbox').forEach(cb => {
                if (cb.checked) {
                    cb.checked = false;
                    cb.dispatchEvent(new Event('change'));
                }
            });
        });

        document.getElementById('non-line-select').addEventListener('change', () => {
            loadMultipleRunsData();
        });

        function createChartDOM(id, title, type, layout) {
            layout = layout || {};
            let controlsHtml = '';
            
            if (type === 'line' || type === 'line_multi' || type === 'scatter') {
                controlsHtml += `<label style="cursor: pointer;"><input type="checkbox" id="log_${id}" onchange="updateChart('${id}')"> Log Y Scale</label>`;
                controlsHtml += `<label style="display: flex; align-items: center; gap: 5px;">Smoothing: <input type="range" id="smooth_${id}" min="0" max="0.99" step="0.01" value="0.0" oninput="updateChart('${id}')"></label>`;
            }
            if (layout.equal_aspect) {
                controlsHtml += `<label style="cursor: pointer;"><input type="checkbox" id="equal_${id}" onchange="updateChart('${id}')" checked> Equal X/Y Scale</label>`;
            }

            return `
                <div class="chart-box" id="box_${id}">
                    <div class="chart-controls">
                        <b style="color: #3b82f6;">${title}</b>
                        ${controlsHtml}
                    </div>
                    <div class="chart-wrapper">
                        <div class="chart-container ${layout.equal_aspect ? 'square-mode' : ''}" id="container_${id}">
                            <canvas id="canvas_${id}"></canvas>
                        </div>
                    </div>
                </div>
            `;
        }

        let currentLoadId = 0;

        async function loadMultipleRunsData() {
            const loadId = ++currentLoadId;
            const container = document.getElementById('dynamic-charts-container');
            const warningsContainer = document.getElementById('run-warnings-container');
            
            if (selectedRuns.length === 0) {
                document.getElementById('run-title-display').textContent = 'No runs selected';
                container.innerHTML = '';
                if (warningsContainer) warningsContainer.style.display = 'none';
                return;
            }
            
            let titleText = `Comparing ${selectedRuns.length} run(s)`;
            if (selectedRuns.length === 1) {
                titleText = `${selectedRuns[0].run_name || 'Run'} (Run #${selectedRuns[0].run_number || '?'})`;
                if (selectedRuns[0].source_script) titleText += ` — Script: ${selectedRuns[0].source_script}`;
            }
            document.getElementById('run-title-display').textContent = titleText;
            
            container.innerHTML = '';
            if (warningsContainer) {
                warningsContainer.style.display = 'none';
                warningsContainer.innerHTML = '';
            }
            let warnings = [];
            
            Object.values(chartInstances).forEach(c => c.destroy());
            chartInstances = {};
            chartConfigs = {};

            try {
                const nonLineMode = document.getElementById('non-line-select').value;
                
                const runPromises = selectedRuns.map(async (run) => {
                    const runIdx = allRuns.indexOf(run);
                    const runCharts = {};
                    const filesToFetch = new Set();
                    const chartsByFile = {};
                    
                    if (run.charts && run.charts.length > 0) {
                        run.charts.forEach(chart => {
                            if (chart.type === 'line' || chart.type === 'line_multi') {
                                filesToFetch.add(chart.filename);
                                if (!chartsByFile[chart.filename]) chartsByFile[chart.filename] = [];
                                chartsByFile[chart.filename].push(chart);
                            }
                        });
                    }
                    if (!run.files || run.files.includes('metrics.csv')) {
                        filesToFetch.add('metrics.csv');
                    }
                    
                    for (const filename of filesToFetch) {
                        const response = await fetch(`/${run.folder}/${filename}`);
                        if (!response.ok) continue;
                        const text = await response.text();
                        const rows = text.trim().split('\n');
                        if (rows.length === 0 || rows[0] === "") continue;
                        
                        const headers = rows[0].split(',').map(h => h.trim());
                        const epochIdx = headers.indexOf('epoch');
                        const epochs = [];
                        const metricData = {};
                        const claimedColumns = new Set();
                        
                        const fileCharts = chartsByFile[filename] || [];
                        fileCharts.forEach(chart => {
                            if (chart.series) chart.series.forEach(s => claimedColumns.add(s.y));
                        });
                        
                        headers.forEach((h, idx) => {
                            if (h !== 'epoch' && h !== 'step') {
                                metricData[h] = { idx: idx, values: [] };
                            }
                        });
                        
                        for(let i=1; i<rows.length; i++) {
                            const cols = rows[i].split(',');
                            if (cols.length > 1) {
                                epochs.push(epochIdx !== -1 ? parseFloat(cols[epochIdx]) : i);
                                Object.keys(metricData).forEach(k => {
                                    metricData[k].values.push(parseFloat(cols[metricData[k].idx]));
                                });
                            }
                        }
                        
                        fileCharts.forEach(chart => {
                            if (chart.series && chart.series.length > 0) {
                                const id = `custom_${chart.title.replace(/[^a-zA-Z0-9]/g, '_')}`;
                                const dsData = {};
                                chart.series.forEach(s => {
                                    if (metricData[s.y]) dsData[s.y] = metricData[s.y].values;
                                });
                                runCharts[id] = { type: 'line_multi', title: chart.title, layout: chart.layout || {}, series: chart.series, epochs, datasetsData: dsData };
                            }
                        });
                        
                        Object.keys(metricData).forEach(metricName => {
                            if (!claimedColumns.has(metricName)) {
                                const id = `metric_${filename.replace(/[^a-zA-Z0-9]/g, '_')}_${metricName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                                runCharts[id] = { type: 'line', title: `Metric: ${metricName} (${filename})`, epochs, values: metricData[metricName].values, layout: {} };
                            }
                        });
                    }
                    
                    if (run.charts && run.charts.length > 0) {
                        for (const chart of run.charts) {
                            if (chart.type === 'line' || chart.type === 'line_multi') continue;
                            const cRes = await fetch(`/${run.folder}/${chart.filename}`);
                            if (cRes.ok) {
                                const text = await cRes.text();
                                let id = `custom_${chart.title.replace(/[^a-zA-Z0-9]/g, '_')}`;
                                runCharts[id] = { type: chart.type, title: chart.title, layout: chart.layout || {}, series: chart.series || [], raw_csv: text };
                            }
                        }
                    }
                    
                    return { run, runIdx, runCharts };
                });
                
                const results = await Promise.all(runPromises);
                if (loadId !== currentLoadId) return;
                
                results.forEach(res => {
                    const { run, runIdx, runCharts } = res;
                    const runName = run.run_name || `Run #${run.run_number || runIdx}`;
                    
                    Object.keys(runCharts).forEach(id => {
                        const chartData = runCharts[id];
                        let targetId = id;
                        
                        if (chartData.type !== 'line' && chartData.type !== 'line_multi' && chartData.type !== 'scatter') {
                            if (nonLineMode === 'none') return;
                            if (nonLineMode === 'all') {
                                targetId = `${id}_run${runIdx}`;
                            }
                        }
                        
                        if (!chartConfigs[targetId]) {
                            chartConfigs[targetId] = {
                                type: chartData.type,
                                title: (nonLineMode === 'all' && chartData.type !== 'line' && chartData.type !== 'line_multi' && chartData.type !== 'scatter' && selectedRuns.length > 1) ? `${chartData.title} (${runName})` : chartData.title,
                                layout: chartData.layout,
                                series: chartData.series,
                                dataByRun: []
                            };
                            container.insertAdjacentHTML('beforeend', createChartDOM(targetId, chartConfigs[targetId].title, chartData.type, chartData.layout));
                        }
                        
                        if (nonLineMode === 'latest' && chartData.type !== 'line' && chartData.type !== 'line_multi' && chartData.type !== 'scatter') {
                            if (chartConfigs[targetId].dataByRun.length === 0) {
                                chartConfigs[targetId].dataByRun.push({ runName, runIdx, ...chartData });
                            }
                        } else {
                            chartConfigs[targetId].dataByRun.push({ runName, runIdx, ...chartData });
                        }
                    });
                });
                
                if (loadId !== currentLoadId) return;
                
                Object.keys(chartConfigs).forEach(id => updateChart(id));
                
                if (warnings.length > 0) {
                    warningsContainer.style.display = 'block';
                    warningsContainer.innerHTML = '<strong style="display: flex; align-items: center; gap: 8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> Configuration Warnings</strong><ul style="margin-top: 10px; margin-bottom: 0;">' + warnings.map(w => `<li style="margin-bottom: 5px;">${w}</li>`).join('') + '</ul>';
                }

            } catch (err) {
                console.error("Error loading multiple runs data:", err);
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) return;
                const status = await res.json();
                const badge = document.getElementById('status-badge');
                if (status.mode === 'cloud') {
                    badge.textContent = `☁️ Cloud`;
                    badge.title = status.repo;
                    badge.style.background = '#0ea5e9';
                    badge.style.color = '#fff';
                } else {
                    badge.textContent = '🏠 Local';
                    badge.style.background = '#475569';
                    badge.style.color = '#fff';
                }
            } catch(e) {
                console.error("Status fetch failed", e);
            }
        }

        fetchStatus();
        fetchRuns();

        function updateChart(id) {
            const config = chartConfigs[id];
            if (!config) return;

            const ctx = document.getElementById(`canvas_${id}`).getContext('2d');
            if (chartInstances[id]) chartInstances[id].destroy();

            const logEl = document.getElementById(`log_${id}`);
            const isLog = logEl ? logEl.checked : false;
            
            const smoothEl = document.getElementById(`smooth_${id}`);
            const smoothWeight = smoothEl ? parseFloat(smoothEl.value) : 0;
            
            const equalEl = document.getElementById(`equal_${id}`);
            const isEqual = equalEl ? equalEl.checked : (config.layout && config.layout.equal_aspect || false);

            if (isEqual) {
                document.getElementById(`container_${id}`).classList.add('square-mode');
            } else {
                document.getElementById(`container_${id}`).classList.remove('square-mode');
            }

            if (config.type === 'line' || config.type === 'line_multi' || config.type === 'scatter') {
                const datasets = [];
                
                config.dataByRun.forEach(runData => {
                    const runName = runData.runName;
                    const c = RUN_COLORS[runData.runIdx % RUN_COLORS.length];
                    const c_raw = c + '40';
                    
                    if (config.type === 'line') {
                        const rawPoints = runData.epochs.map((e, i) => ({x: e, y: runData.values[i]}));
                        const smoothed = calculateEMA(runData.values, smoothWeight);
                        const smoothedPoints = runData.epochs.map((e, i) => ({x: e, y: smoothed[i]}));
                        
                        let labelPrefix = config.dataByRun.length > 1 ? `${runName}` : 'Smoothed';
                        let rawLabelPrefix = config.dataByRun.length > 1 ? `${runName} (Raw)` : 'Raw';
                        
                        if (smoothWeight > 0) datasets.push({ label: rawLabelPrefix, data: rawPoints, borderColor: c_raw, borderWidth: 1, pointRadius: 0, showLine: true });
                        datasets.push({ label: labelPrefix, data: smoothedPoints, borderColor: c, borderWidth: 2, pointRadius: smoothWeight > 0 ? 0 : 2, showLine: true });
                    } 
                    else if (config.type === 'line_multi') {
                        let seriesIdx = 0;
                        config.series.forEach(s => {
                            const col = s.y;
                            const seriesName = s.name || col;
                            const vals = runData.datasetsData[col];
                            if (vals) {
                                const rawPoints = runData.epochs.map((e, i) => ({x: e, y: vals[i]}));
                                const smoothed = calculateEMA(vals, smoothWeight);
                                const smoothedPoints = runData.epochs.map((e, i) => ({x: e, y: smoothed[i]}));
                                
                                const dash = seriesIdx > 0 ? [5, 5] : [];
                                
                                let labelPrefix = config.dataByRun.length > 1 ? `${seriesName} (${runName})` : seriesName;
                                let rawLabelPrefix = config.dataByRun.length > 1 ? `${seriesName} (${runName} Raw)` : `${seriesName} (Raw)`;
                                
                                if (smoothWeight > 0) datasets.push({ label: rawLabelPrefix, data: rawPoints, borderColor: c_raw, borderWidth: 1, pointRadius: 0, showLine: true, borderDash: dash });
                                datasets.push({ label: labelPrefix, data: smoothedPoints, borderColor: c, borderWidth: 2, pointRadius: smoothWeight > 0 ? 0 : 2, showLine: true, borderDash: dash });
                                
                                seriesIdx++;
                            }
                        });
                    }
                    else if (config.type === 'scatter') {
                        const rows = runData.raw_csv.trim().split('\n');
                        const headers = rows[0].split(',').map(h => h.trim());
                        
                        config.series.forEach((s, sIdx) => {
                            const xIdx = headers.indexOf(s.x);
                            const yIdx = headers.indexOf(s.y);
                            if (xIdx === -1 || yIdx === -1) return;
                            
                            let data = [];
                            for(let i=1; i<rows.length; i++) {
                                const cols = rows[i].split(',');
                                if (cols.length > Math.max(xIdx, yIdx)) {
                                    const xVal = parseFloat(cols[xIdx]);
                                    const yVal = parseFloat(cols[yIdx]);
                                    if (!isNaN(xVal) && !isNaN(yVal)) {
                                        data.push({x: xVal, y: yVal});
                                    }
                                }
                            }
                            
                            if (smoothWeight > 0) {
                                const sx = calculateEMA(data.map(d=>d.x), smoothWeight);
                                const sy = calculateEMA(data.map(d=>d.y), smoothWeight);
                                data = sx.map((x, i) => ({x: x, y: sy[i]}));
                            }
                            
                            let labelPrefix = config.dataByRun.length > 1 ? `${s.name || 'Series'} (${runName})` : (s.name || `Series ${sIdx+1}`);
                            const dash = sIdx > 0 && config.layout && config.layout.show_lines ? [5, 5] : [];
                            
                            datasets.push({
                                label: labelPrefix,
                                data: data,
                                borderColor: config.dataByRun.length > 1 ? c : RUN_COLORS[sIdx % RUN_COLORS.length],
                                showLine: config.layout && config.layout.show_lines || false,
                                pointRadius: smoothWeight > 0 ? 0 : 3,
                                borderDash: dash
                            });
                        });
                    }
                });

                let options = {
                    responsive: true, maintainAspectRatio: !isEqual, aspectRatio: isEqual ? 1 : undefined, animation: false, color: '#eee',
                    scales: {
                        x: { type: 'linear', ticks: { color: '#aaa' }, grid: { color: '#333' } },
                        y: { type: isLog ? 'logarithmic' : 'linear', ticks: { color: '#aaa' }, grid: { color: '#333' } }
                    }
                };
                if (!isEqual) {
                     options.maintainAspectRatio = false;
                     delete options.aspectRatio;
                }

                if (config.type === 'scatter' && isEqual) {
                    let allX = [];
                    let allY = [];
                    datasets.forEach(ds => {
                        allX = allX.concat(ds.data.map(d=>d.x));
                        allY = allY.concat(ds.data.map(d=>d.y));
                    });
                    allX = allX.filter(v => !isNaN(v));
                    allY = allY.filter(v => !isNaN(v));
                    if(allX.length > 0 && allY.length > 0) {
                        let globalMin = Math.min(...allX, ...allY);
                        let globalMax = Math.max(...allX, ...allY);
                        let padding = (globalMax - globalMin) * 0.1 || 1;
                        options.scales.x.min = globalMin - padding;
                        options.scales.x.max = globalMax + padding;
                        options.scales.y.min = globalMin - padding;
                        options.scales.y.max = globalMax + padding;
                    }
                }

                chartInstances[id] = new Chart(ctx, {
                    type: 'scatter',
                    data: { datasets: datasets },
                    options: options
                });
            }
            else if (config.type === 'heatmap') {
                const runData = config.dataByRun[0];
                if (!runData) return;
                
                const rows = runData.raw_csv.trim().split('\n');
                const headers = rows[0].split(',').map(h => h.trim());
                
                const matrixData = [];
                let maxCount = 0;
                
                const classLabels = config.layout && config.layout.classes ? config.layout.classes : [];
                
                const s = config.series && config.series.length > 0 ? config.series[0] : null;
                const xColIdx = s ? headers.indexOf(s.x) : 1;
                const yColIdx = s ? headers.indexOf(s.y) : 0;
                const vColIdx = s ? headers.indexOf(s.value) : 2;

                for(let i=1; i<rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length > Math.max(xColIdx, yColIdx, vColIdx)) {
                        const x_idx = parseInt(cols[xColIdx]);
                        const y_idx = parseInt(cols[yColIdx]);
                        const count = parseInt(cols[vColIdx]);
                        
                        if (isNaN(x_idx) || isNaN(y_idx) || isNaN(count)) continue;
                        
                        if (count > maxCount) maxCount = count;
                        
                        matrixData.push({
                            x: classLabels[x_idx] || `Class ${x_idx}`,
                            y: classLabels[y_idx] || `Class ${y_idx}`,
                            v: count
                        });
                    }
                }

                chartInstances[id] = new Chart(ctx, {
                    type: 'matrix',
                    data: {
                        datasets: [{
                            label: config.title,
                            data: matrixData,
                            backgroundColor(context) {
                                const value = context.dataset.data[context.dataIndex].v;
                                const alpha = maxCount > 0 ? value / maxCount : 0;
                                return `rgba(59, 130, 246, ${alpha})`;
                            },
                            borderColor: '#111',
                            borderWidth: 1,
                            width: ({chart}) => {
                                const area = chart.chartArea;
                                if (!area) return 0;
                                const numClasses = classLabels.length || 1;
                                return area.width / numClasses - 1;
                            },
                            height: ({chart}) => {
                                const area = chart.chartArea;
                                if (!area) return 0;
                                const numClasses = classLabels.length || 1;
                                return area.height / numClasses - 1;
                            }
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, color: '#eee',
                        scales: {
                            x: { title: { display: true, text: 'Predicted Class', color: '#eee' }, ticks: { color: '#aaa' }, grid: { display: false } },
                            y: { title: { display: true, text: 'True Class', color: '#eee' }, ticks: { color: '#aaa' }, grid: { display: false } }
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    title() { return ''; },
                                    label(context) {
                                        const v = context.dataset.data[context.dataIndex];
                                        return ['True: ' + v.y, 'Pred: ' + v.x, 'Count: ' + v.v];
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }
        document.getElementById('layout-select').addEventListener('change', function(e) {
            const val = e.target.value;
            const container = document.getElementById('dynamic-charts-container');
            if (val === 'auto') {
                container.style.gridTemplateColumns = 'repeat(auto-fit, minmax(450px, 1fr))';
            } else {
                container.style.gridTemplateColumns = `repeat(${val}, 1fr)`;
            }
            
            setTimeout(() => {
                Object.values(chartInstances).forEach(chart => chart.resize());
            }, 100);
        });
    </script>
</body>
</html>
